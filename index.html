<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluation System - DataCube</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary-red: #E30613; --dark: #1a1a1a; --gray: #f4f4f4; }
        * { font-family: 'Kanit', sans-serif; box-sizing: border-box; }
        body { background-color: var(--gray); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background: white; width: 100%; max-width: 600px; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 8px solid var(--primary-red); }
        .logo-section { text-align: center; margin-bottom: 20px; }
        .logo-section img { max-width: 150px; min-height: 50px; object-fit: contain; }
        .company-title { text-align: center; font-size: 1.5rem; font-weight: 600; color: var(--dark); margin-bottom: 30px; }
        .landing-menu { display: flex; flex-direction: column; gap: 15px; }
        .menu-btn { padding: 20px; font-size: 1.1rem; font-weight: 600; border: 2px solid var(--primary-red); border-radius: 10px; background: white; color: var(--primary-red); cursor: pointer; transition: 0.3s; }
        .menu-btn:hover { background: var(--primary-red); color: white; transform: translateY(-3px); }
        .hidden { display: none; }
        .form-header { display: flex; align-items: center; margin-bottom: 25px; gap: 10px; }
        .back-btn { background: #eee; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--dark); }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        textarea { height: 100px; resize: vertical; }
        .submit-btn { width: 100%; padding: 15px; background: var(--primary-red); color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        .submit-btn:hover { background: #b3050f; }
        #adminBtn { position: fixed; bottom: 10px; right: 10px; opacity: 0.1; border: none; background: none; cursor: pointer; font-size: 10px; }
        #adminBtn:hover { opacity: 1; color: var(--primary-red); }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-section">
        <!-- ใส่ ID mainLogo เพื่อรอรับลิงก์จาก Sheets -->
        <img id="mainLogo" src="https://i.ibb.co/2xYmDGM/logo-square.jpg" alt="Logo">
    </div>
    <div id="compName" class="company-title">DataCube</div>

    <div id="landingPage" class="landing-menu">
        <div style="text-align: center; margin-bottom: 10px; color: #666;">กรุณาเลือกประเภทการประเมิน</div>
        <button class="menu-btn" onclick="startApp('self')">ประเมินตนเอง (Self-Evaluation)</button>
        <button class="menu-btn" onclick="startApp('client')">ประเมินโดยลูกค้า (Client Evaluation)</button>
    </div>

    <div id="formPage" class="hidden">
        <div class="form-header">
            <button class="back-btn" onclick="goHome()">← ย้อนกลับ</button>
            <h3 id="formTitle" style="margin:0; color: var(--primary-red);"></h3>
        </div>
        <form id="evalForm">
            <div class="form-group">
                <label>ชื่อผู้ประเมิน</label>
                <input type="text" id="evaluator" placeholder="กรอกชื่อ-นามสกุล ของท่าน" required>
            </div>
            <div class="form-group" id="empSelectArea">
                <label>พนักงานที่ต้องการประเมิน</label>
                <select id="employee">
                    <option value="ประเมินตนเอง">-- ประเมินตนเอง --</option>
                    <option value="พนักงาน A">พนักงาน A</option>
                    <option value="พนักงาน B">พนักงาน B</option>
                </select>
            </div>
            <div id="questionArea"></div>
            <button type="submit" id="saveBtn" class="submit-btn">ส่งผลการประเมิน</button>
        </form>
    </div>
</div>

<button id="adminBtn" onclick="openAdmin()">Admin Config</button>

<script>
    // ** เปลี่ยน URL ตรงนี้เป็น Web App URL ล่าสุดของคุณ **
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwhQyaD82Ywe54ewtNM5ZIfRp0umB54N-5CYorvMoxAXUW_TuxO_MXS1YsqbSDVuqSA/exec';
    let currentMode = '';

    // โหลดโลโก้และชื่อบริษัทเมื่อเปิดหน้าเว็บ
    window.onload = () => {
        fetch(scriptURL)
        .then(res => res.json())
        .then(data => {
            if(data.logo) document.getElementById('mainLogo').src = data.logo;
            if(data.company) document.getElementById('compName').innerText = data.company;
        })
        .catch(err => console.error("Logo load error:", err));
    };

    const questions = {
        self: ["ความสำเร็จที่ภูมิใจที่สุด?","จุดแข็งที่นำมาใช้?","ส่วนที่ควรปรับปรุง?","ทักษะที่ได้เรียนรู้ใหม่?","คะแนนความรับผิดชอบ (1-10)?","อุปสรรคที่พบ?","เป้าหมายระยะถัดไป?","ข้อเสนอแนะเพื่อทีม?"],
        client: ["ความเข้าใจในความต้องการ?","ความรวดเร็วในการตอบสนอง?","คุณภาพงานตรงกำหนดหรือไม่?","การสื่อสารชัดเจนหรือไม่?","ทักษะที่ประทับใจที่สุด?","จุดที่อยากให้ปรับปรุง?","ความไว้วางใจในอนาคต?","ข้อเสนอแนะเพิ่มเติม?"]
    };

    function startApp(mode) {
        currentMode = mode;
        document.getElementById('landingPage').classList.add('hidden');
        document.getElementById('formPage').classList.remove('hidden');
        document.getElementById('formTitle').innerText = mode === 'self' ? 'แบบประเมินตนเอง' : 'แบบประเมินโดยลูกค้า';
        
        document.getElementById('empSelectArea').style.display = mode === 'self' ? 'none' : 'block';
        document.getElementById('employee').value = mode === 'self' ? 'ประเมินตนเอง' : '';

        const qArea = document.getElementById('questionArea');
        qArea.innerHTML = '';
        questions[mode].forEach((q, i) => {
            qArea.innerHTML += `<div class="form-group"><label>${i+1}. ${q}</label><textarea id="q${i+1}" required></textarea></div>`;
        });
    }

    function goHome() {
        document.getElementById('landingPage').classList.remove('hidden');
        document.getElementById('formPage').classList.add('hidden');
    }

    document.getElementById('evalForm').addEventListener('submit', e => {
        e.preventDefault();
        Swal.fire({ title: 'กำลังส่งข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        const body = {
            action: "saveEval",
            type: currentMode,
            evaluator: document.getElementById('evaluator').value,
            employee: document.getElementById('employee').value
        };
        for(let i=1; i<=8; i++) { body['q'+i] = document.getElementById('q'+i).value; }

        fetch(scriptURL, { method: 'POST', body: JSON.stringify(body) })
        .then(() => {
            Swal.fire({ icon: 'success', title: 'บันทึกสำเร็จ!', text: 'ขอบคุณครับ' }).then(() => location.reload());
        });
    });

    async function openAdmin() {
        const { value: formValues } = await Swal.fire({
            title: 'ตั้งค่าระบบ',
            html: '<input id="sw-logo" class="swal2-input" placeholder="ลิงก์โลโก้"><input id="sw-comp" class="swal2-input" placeholder="ชื่อบริษัท">',
            preConfirm: () => ({ logo: document.getElementById('sw-logo').value, company: document.getElementById('sw-comp').value })
        });
        if (formValues) {
            fetch(scriptURL, { method: 'POST', body: JSON.stringify({ action: "updateSettings", ...formValues }) }).then(() => location.reload());
        }
    }
</script>
</body>
</html>
