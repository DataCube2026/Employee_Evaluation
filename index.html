<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COE Data Evaluation - DataCube</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary-red: #E30613; --dark: #1a1a1a; --gray: #f4f4f4; }
        * { font-family: 'Kanit', sans-serif; box-sizing: border-box; }
        body { background-color: var(--gray); margin: 0; padding: 20px; color: var(--dark); }
        .container { background: white; width: 100%; max-width: 650px; margin: auto; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 8px solid var(--primary-red); }
        .logo-section { text-align: center; margin-bottom: 10px; }
        .logo-section img { max-width: 140px; }
        .company-title { text-align: center; font-size: 1.4rem; font-weight: 600; margin-bottom: 5px; }
        .team-title { text-align: center; font-size: 1rem; color: var(--primary-red); margin-bottom: 25px; }
        
        .menu-btn { width: 100%; padding: 20px; margin-bottom: 15px; font-size: 1.1rem; font-weight: 600; border: 2px solid var(--primary-red); border-radius: 12px; background: white; color: var(--primary-red); cursor: pointer; transition: 0.3s; }
        .menu-btn:hover { background: var(--primary-red); color: white; }
        
        .hidden { display: none; }
        .form-header { display: flex; align-items: center; margin-bottom: 20px; gap: 15px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .back-btn { background: #eee; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
        
        .form-group { margin-bottom: 30px; padding: 15px; background: #fdfdfd; border-radius: 10px; border: 1px solid #f0f0f0; }
        label { display: block; margin-bottom: 15px; font-weight: 600; font-size: 1rem; line-height: 1.4; color: #333; }
        select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; margin-bottom: 10px; }
        textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem; height: 70px; margin-top: 10px; background: #fff; }

        /* ระบบคะแนนแบบ 1-5 */
        .score-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin: 10px 0; }
        .score-btn { flex: 1; height: 50px; border: 1px solid #ddd; background: white; border-radius: 8px; font-size: 1.2rem; font-weight: 600; color: #666; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .score-btn span { font-size: 0.65rem; font-weight: 300; margin-top: 2px; }
        .score-btn:hover { border-color: var(--primary-red); color: var(--primary-red); }
        .score-btn.active { background: var(--primary-red); color: white; border-color: var(--primary-red); }
        
        .legend { display: flex; justify-content: space-between; font-size: 0.75rem; color: #888; padding: 0 5px; }

        .submit-btn { width: 100%; padding: 18px; background: var(--primary-red); color: white; border: none; border-radius: 10px; font-size: 1.2rem; font-weight: 600; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 10px rgba(227, 6, 19, 0.2); }
        .submit-btn:hover { background: #b3050f; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-section"><img id="mainLogo" src="https://i.ibb.co/2xYmDGM/logo-square.jpg" alt="Logo"></div>
    <div id="compName" class="company-title">DataCube</div>
    <div class="team-title">ระบบประเมินผลการดำเนินงาน ทีม COE Data</div>

    <!-- หน้าแรก: เลือกประเภท -->
    <div id="landingPage">
        <button class="menu-btn" onclick="startApp('self')">ประเมินผลงานภายในทีม (Self-Evaluation)</button>
        <button class="menu-btn" onclick="startApp('client')">ลูกค้าประเมินความพึงพอใจ (Client Evaluation)</button>
    </div>

    <!-- หน้าฟอร์ม -->
    <div id="formPage" class="hidden">
        <div class="form-header">
            <button class="back-btn" onclick="goHome()">← ย้อนกลับ</button>
            <h3 id="formTitle" style="margin:0; color: var(--primary-red);"></h3>
        </div>

        <form id="evalForm">
            <div class="form-group" style="background: #fff8f8; border-color: #ffe0e0;">
                <label>หน่วยงาน / บริษัท ของท่าน (BU)</label>
                <select id="bu" required>
                    <option value="">-- กรุณาเลือก BU ของท่าน --</option>
                    <option value="Jaymart Mobile (JMB)">1. Jaymart Mobile (JMB)</option>
                    <option value="JElite (JPoint)">2. JElite (JPoint)</option>
                    <option value="Brewing Happiness (BH)">3. Brewing Happiness (BH)</option>
                    <option value="JAS Asset (JAS)">4. JAS Asset (JAS)</option>
                    <option value="SG Capital (SGC)">5. SG Capital (SGC)</option>
                    <option value="Rawmat Coffee (RMC)">6. Rawmat Coffee (RMC)</option>
                    <option value="CEO Business (Gen II)">7. CEO Business (Gen II)</option>
                    <option value="Jaymart Holding (JMH)">8. Jaymart Holding (JMH)</option>
                </select>
            </div>

            <div id="questionArea"></div>

            <button type="submit" class="submit-btn">ส่งผลการประเมิน</button>
        </form>
    </div>
</div>

<script>
    // ** เปลี่ยน URL ตรงนี้เป็น Web App URL ของคุณที่ได้จาก Apps Script **
    const scriptURL = 'ใส่_URL_WEB_APP_ที่นี่';
    let currentMode = '';

    const questions = {
        self: [
            "ระดับความเข้าใจในเป้าหมายและการดำเนินงานของทีม COE Data",
            "ประสิทธิภาพการบริหารจัดการเวลาและการส่งมอบงาน",
            "ความถูกต้องแม่นยำและการตรวจสอบคุณภาพของข้อมูล",
            "ความราบรื่นในการทำงานร่วมกันและการสื่อสารภายในทีม",
            "ความพร้อมและความเหมาะสมของเครื่องมือ/Technology ที่ใช้",
            "ความสามารถในการแก้ปัญหาและหาทางออกใหม่ๆ",
            "การสร้างคุณค่า (Value Add) ให้กับธุรกิจผ่านข้อมูล",
            "ความพึงพอใจต่อบรรยากาศและสภาพแวดล้อมในการทำงาน"
        ],
        client: [
            "ความเข้าใจในโจทย์และความต้องการทางธุรกิจของทีม COE Data",
            "ความรวดเร็วในการตอบสนองและการส่งมอบงานตามกำหนดการ",
            "ความถูกต้องและคุณภาพของรายงาน/ข้อมูลที่ได้รับ",
            "การสื่อสารข้อมูลที่ซับซ้อนให้เข้าใจง่ายและใช้งานได้จริง",
            "ความเป็นมืออาชีพและความกระตือรือร้นในการให้บริการ",
            "การให้คำแนะนำหรือโซลูชันที่มีประโยชน์ต่อหน่วยงานท่าน",
            "ความคุ้มค่าและผลประโยชน์ที่ได้รับจากงานของทีม",
            "ระดับความพึงพอใจโดยรวมต่อการดำเนินงานของทีม COE Data"
        ]
    };

    function startApp(mode) {
        currentMode = mode;
        document.getElementById('landingPage').classList.add('hidden');
        document.getElementById('formPage').classList.remove('hidden');
        document.getElementById('formTitle').innerText = mode === 'self' ? 'ประเมินตนเอง' : 'ลูกค้าประเมินทีม';
        
        const qArea = document.getElementById('questionArea');
        qArea.innerHTML = '';
        
        questions[mode].forEach((q, i) => {
            let qNum = i + 1;
            qArea.innerHTML += `
                <div class="form-group">
                    <label>${qNum}. ${q}</label>
                    <div class="legend"><span>น้อยที่สุด</span><span>มากที่สุด</span></div>
                    <div class="score-row">
                        <button type="button" class="score-btn" onclick="setScore(${qNum}, 1)" id="q${qNum}_1">1</button>
                        <button type="button" class="score-btn" onclick="setScore(${qNum}, 2)" id="q${qNum}_2">2</button>
                        <button type="button" class="score-btn" onclick="setScore(${qNum}, 3)" id="q${qNum}_3">3</button>
                        <button type="button" class="score-btn" onclick="setScore(${qNum}, 4)" id="q${qNum}_4">4</button>
                        <button type="button" class="score-btn" onclick="setScore(${qNum}, 5)" id="q${qNum}_5">5</button>
                    </div>
                    <input type="hidden" id="q${qNum}_score" required>
                    <textarea id="q${qNum}_note" placeholder="ข้อเสนอแนะเพิ่มเติมสำหรับข้อนี้..."></textarea>
                </div>`;
        });
    }

    function setScore(qNum, score) {
        for(let i=1; i<=5; i++) {
            document.getElementById(`q${qNum}_${i}`).classList.remove('active');
        }
        document.getElementById(`q${qNum}_${score}`).classList.add('active');
        document.getElementById(`q${qNum}_score`).value = score;
    }

    function goHome() {
        document.getElementById('landingPage').classList.remove('hidden');
        document.getElementById('formPage').classList.add('hidden');
    }

    document.getElementById('evalForm').addEventListener('submit', e => {
        e.preventDefault();
        
        // ตรวจสอบว่าให้คะแนนครบหรือยัง
        for(let i=1; i<=8; i++) {
            if(!document.getElementById(`q${i}_score`).value) {
                Swal.fire('ข้อมูลไม่ครบ', `กรุณาให้คะแนนข้อที่ ${i}`, 'warning');
                return;
            }
        }

        Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        const body = {
            action: "saveEval",
            type: currentMode,
            bu: document.getElementById('bu').value,
            target: "ทีม COE Data" // ระบุเป็นชื่อทีมอัตโนมัติ
        };

        for(let i=1; i<=8; i++) {
            body[`q${i}_score`] = document.getElementById(`q${i}_score`).value;
            body[`q${i}_note`] = document.getElementById(`q${i}_note`).value;
        }

        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(body) })
        .then(() => {
            Swal.fire({ icon: 'success', title: 'ขอบคุณครับ!', text: 'เราได้รับผลการประเมินเรียบร้อยแล้ว' })
            .then(() => location.reload());
        });
    });
</script>
</body>
</html>
