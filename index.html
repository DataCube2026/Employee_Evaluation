<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COE Data Evaluation - DataCube</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary-red: #E30613; --dark: #1a1a1a; --gray: #f4f4f4; }
        * { font-family: 'Kanit', sans-serif; box-sizing: border-box; }
        body { background-color: var(--gray); margin: 0; padding: 20px; color: var(--dark); }
        .container { background: white; width: 100%; max-width: 700px; margin: auto; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 8px solid var(--primary-red); }
        .logo-section { text-align: center; margin-bottom: 10px; }
        .logo-section img { max-width: 140px; }
        .company-title { text-align: center; font-size: 1.4rem; font-weight: 600; margin-bottom: 5px; }
        .team-title { text-align: center; font-size: 1rem; color: var(--primary-red); margin-bottom: 25px; }
        
        .menu-btn { width: 100%; padding: 18px; margin-bottom: 15px; font-size: 1.1rem; font-weight: 600; border: 2px solid var(--primary-red); border-radius: 10px; background: white; color: var(--primary-red); cursor: pointer; transition: 0.3s; }
        .menu-btn:hover { background: var(--primary-red); color: white; }
        
        .hidden { display: none; }
        .form-header { display: flex; align-items: center; margin-bottom: 25px; gap: 15px; }
        .back-btn { background: #eee; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        
        .form-group { margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        label { display: block; margin-bottom: 10px; font-weight: 600; font-size: 1rem; color: #333; }
        select, input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; background: #fff; }
        textarea { height: 70px; margin-top: 10px; font-size: 0.9rem; }

        /* Rating System */
        .rating-container { display: flex; justify-content: space-between; gap: 5px; margin: 10px 0; overflow-x: auto; padding-bottom: 5px; }
        .rating-item { flex: 1; text-align: center; cursor: pointer; border: 1px solid #ddd; padding: 10px 5px; border-radius: 8px; font-size: 0.85rem; transition: 0.2s; min-width: 75px; background: #fafafa; }
        .rating-item:hover { border-color: var(--primary-red); color: var(--primary-red); }
        .rating-item.active { background: var(--primary-red); color: white; border-color: var(--primary-red); font-weight: 600; }
        
        .submit-btn { width: 100%; padding: 18px; background: var(--primary-red); color: white; border: none; border-radius: 8px; font-size: 1.2rem; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .submit-btn:hover { background: #b3050f; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-section">
        <img id="mainLogo" src="https://i.ibb.co/2xYmDGM/logo-square.jpg" alt="Logo">
    </div>
    <div id="compName" class="company-title">DataCube</div>
    <div class="team-title">ระบบประเมินผลทีม COE Data</div>

    <!-- หน้าแรก เลือกประเภท -->
    <div id="landingPage">
        <button class="menu-btn" onclick="startApp('self')">ประเมินผลงานภายในทีม (Self-Evaluation)</button>
        <button class="menu-btn" onclick="startApp('client')">ลูกค้าประเมินความพึงพอใจ (Client Evaluation)</button>
    </div>

    <!-- หน้าฟอร์ม -->
    <div id="formPage" class="hidden">
        <div class="form-header">
            <button class="back-btn" onclick="goHome()">← ย้อนกลับ</button>
            <h3 id="formTitle" style="margin:0; color: var(--primary-red);"></h3>
        </div>

        <form id="evalForm">
            <div class="form-group">
                <label>แผนก/บริษัท ของท่าน (BU)</label>
                <select id="bu" required>
                    <option value="">-- กรุณาเลือก BU ของท่าน --</option>
                    <option value="Jaymart Mobile (JMB)">1. Jaymart Mobile (JMB)</option>
                    <option value="JElite (JPoint)">2. JElite (JPoint)</option>
                    <option value="Brewing Happiness (BH)">3. Brewing Happiness (BH)</option>
                    <option value="JAS Asset (JAS)">4. JAS Asset (JAS)</option>
                    <option value="SG Capital (SGC)">5. SG Capital (SGC)</option>
                    <option value="Rawmat Coffee (RMC)">6. Rawmat Coffee (RMC)</option>
                    <option value="CEO Business (Gen II)">7. CEO Business (Gen II)</option>
                    <option value="Jaymart Holding (JMH)">8. Jaymart Holding (JMH)</option>
                    <option value="Other / External">9. อื่นๆ / บุคคลภายนอก</option>
                </select>
            </div>

            <div class="form-group">
                <label id="targetLabel">ระบุชื่อผู้ถูกประเมิน (พนักงานหรือชื่อทีมย่อย)</label>
                <input type="text" id="targetName" placeholder="พิมพ์ชื่อผู้ถูกประเมินที่นี่" required>
            </div>

            <div id="questionArea"></div>

            <button type="submit" class="submit-btn">ส่งข้อมูลการประเมิน</button>
        </form>
    </div>
</div>

<script>
    // ** เปลี่ยน URL ตรงนี้เป็น Web App URL ของคุณที่ได้จาก Apps Script **
    const scriptURL = 'ใส่_URL_WEB_APP_ที่นี่';
    let currentMode = '';
    const ratingLevels = ["น้อยสุด", "น้อย", "กลาง", "มาก", "มากสุด"];

    const questions = {
        self: [
            "ระดับความเข้าใจในเป้าหมายและการดำเนินงานของทีม COE Data",
            "ประสิทธิภาพการบริหารจัดการเวลาและการส่งมอบงาน",
            "ความถูกต้องแม่นยำและการตรวจสอบคุณภาพของข้อมูล",
            "ความราบรื่นในการทำงานร่วมกันและการสื่อสารภายในทีม",
            "ความพร้อมและความเหมาะสมของเครื่องมือ/Technology ที่ใช้",
            "ความสามารถในการแก้ปัญหาและหาทางออกใหม่ๆ",
            "การสร้างคุณค่า (Value Add) ให้กับธุรกิจผ่านข้อมูล",
            "ความพึงพอใจต่อบรรยากาศและสภาพแวดล้อมในการทำงาน"
        ],
        client: [
            "ทีม COE Data มีความเข้าใจในโจทย์และความต้องการของท่านเพียงใด",
            "ความรวดเร็วในการตอบสนองและการส่งมอบงานตามกำหนดการ",
            "ความถูกต้องและคุณภาพของรายงาน/ข้อมูลที่ท่านได้รับ",
            "การสื่อสารข้อมูลที่ซับซ้อนให้เข้าใจง่ายและใช้งานได้จริง",
            "ความเป็นมืออาชีพและความกระตือรือร้นในการให้บริการ",
            "การให้คำแนะนำหรือ Solution ที่มีประโยชน์ต่อหน่วยงานท่าน",
            "ความคุ้มค่าและประโยชน์ที่ได้รับจากงานของทีม COE Data",
            "ระดับความพึงพอใจโดยรวมต่อการดำเนินงานของทีม COE Data"
        ]
    };

    function startApp(mode) {
        currentMode = mode;
        document.getElementById('landingPage').classList.add('hidden');
        document.getElementById('formPage').classList.remove('hidden');
        document.getElementById('formTitle').innerText = mode === 'self' ? 'ประเมินตนเอง' : 'ลูกค้าประเมินทีม';
        document.getElementById('targetLabel').innerText = mode === 'self' ? 'ระบุตำแหน่งหรือทีมย่อยของคุณ' : 'พิมพ์ชื่อพนักงานหรือทีมย่อยที่ท่านทำงานด้วย';
        
        const qArea = document.getElementById('questionArea');
        qArea.innerHTML = '';
        
        questions[mode].forEach((q, i) => {
            let qNum = i + 1;
            let ratingHTML = ratingLevels.map(lvl => 
                `<div class="rating-item" onclick="setRating(${qNum}, '${lvl}')" id="q${qNum}_${lvl}">${lvl}</div>`
            ).join('');

            qArea.innerHTML += `
                <div class="form-group">
                    <label>${qNum}. ${q}</label>
                    <div class="rating-container">${ratingHTML}</div>
                    <input type="hidden" id="q${qNum}_score" required>
                    <textarea id="q${qNum}_note" placeholder="พิมพ์ข้อความเพิ่มเติมหรือเหตุผลประกอบ..."></textarea>
                </div>`;
        });
    }

    function setRating(qNum, val) {
        ratingLevels.forEach(l => document.getElementById(`q${qNum}_${l}`).classList.remove('active'));
        document.getElementById(`q${qNum}_${val}`).classList.add('active');
        document.getElementById(`q${qNum}_score`).value = val;
    }

    function goHome() {
        document.getElementById('landingPage').classList.remove('hidden');
        document.getElementById('formPage').classList.add('hidden');
    }

    document.getElementById('evalForm').addEventListener('submit', e => {
        e.preventDefault();
        
        // ตรวจสอบว่าเลือกคะแนนครบทุกข้อไหม
        for(let i=1; i<=8; i++) {
            if(!document.getElementById(`q${i}_score`).value) {
                Swal.fire('ข้อมูลไม่ครบ', `กรุณาเลือกความพึงพอใจในข้อที่ ${i}`, 'warning');
                return;
            }
        }

        Swal.fire({ title: 'กำลังส่งข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        const body = {
            action: "saveEval",
            type: currentMode,
            bu: document.getElementById('bu').value,
            target: document.getElementById('targetName').value
        };

        for(let i=1; i<=8; i++) {
            body[`q${i}_score`] = document.getElementById(`q${i}_score`).value;
            body[`q${i}_note`] = document.getElementById(`q${i}_note`).value;
        }

        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(body) })
        .then(() => {
            Swal.fire({ icon: 'success', title: 'บันทึกสำเร็จ!', text: 'ขอบคุณที่ร่วมพัฒนาทีม COE Data ครับ' })
            .then(() => location.reload());
        });
    });
</script>
</body>
</html>
