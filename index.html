<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self-Evaluation - COE Data</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary-red: #E30613; --dark: #1a1a1a; --gray: #f4f4f4; }
        * { font-family: 'Kanit', sans-serif; box-sizing: border-box; }
        body { background-color: var(--gray); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; color: var(--dark); }
        .container { background: white; width: 100%; max-width: 550px; padding: 40px 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 10px solid var(--primary-red); text-align: center; }
        .logo-section { margin-bottom: 15px; }
        .logo-section img { max-width: 140px; }
        .company-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 5px; }
        .team-title { font-size: 1rem; color: var(--primary-red); margin-bottom: 30px; }
        .form-title { color: var(--primary-red); font-size: 1.3rem; font-weight: 600; margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .form-group { margin-bottom: 35px; padding: 20px; background: #fcfcfc; border-radius: 12px; border: 1px solid #f0f0f0; text-align: center; }
        label { display: block; margin-bottom: 15px; font-weight: 600; font-size: 1rem; line-height: 1.5; color: #333; }
        input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; text-align: center; }
        textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem; height: 80px; margin-top: 15px; background: #fff; text-align: center; }
        .score-row { display: flex; justify-content: center; gap: 12px; margin: 15px 0; }
        .score-btn { width: 50px; height: 50px; border: 1px solid #ddd; background: white; border-radius: 10px; font-size: 1.3rem; font-weight: 600; color: #666; cursor: pointer; transition: 0.2s; }
        .score-btn:hover { border-color: var(--primary-red); color: var(--primary-red); }
        .score-btn.active { background: var(--primary-red); color: white; border-color: var(--primary-red); box-shadow: 0 4px 10px rgba(227, 6, 19, 0.3); }
        .legend { display: flex; justify-content: space-between; font-size: 0.8rem; color: #999; max-width: 300px; margin: 0 auto; }
        .submit-btn { width: 100%; padding: 18px; background: var(--primary-red); color: white; border: none; border-radius: 12px; font-size: 1.2rem; font-weight: 600; cursor: pointer; margin-top: 10px; box-shadow: 0 6px 15px rgba(227, 6, 19, 0.2); }
    </style>
</head>
<body>
<div class="container">
    <div class="logo-section"><img src="https://i.ibb.co/2xYmDGM/logo-square.jpg" alt="Logo"></div>
    <div class="company-title">DataCube</div>
    <div class="team-title">ระบบประเมินผลการดำเนินงาน ทีม COE Data</div>
    <div class="form-title">แบบประเมินตนเอง (Self-Evaluation)</div>

    <form id="evalForm">
        <div class="form-group" style="background: #fff8f8; border-color: #ffe0e0;">
            <label>ชื่อ-นามสกุล ของท่าน (พนักงาน)</label>
            <input type="text" id="evaluatorName" placeholder="ระบุชื่อ-นามสกุล ของท่าน" required>
        </div>
        <div id="questionArea"></div>
        <button type="submit" class="submit-btn">ส่งผลการประเมิน</button>
    </form>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwhQyaD82Ywe54ewtNM5ZIfRp0umB54N-5CYorvMoxAXUW_TuxO_MXS1YsqbSDVuqSA/exec';
    const questions = ["ระดับความเข้าใจเป้าหมายทีม", "ประสิทธิภาพจัดการเวลา", "ความถูกต้องของข้อมูล", "ความราบรื่นในทีม", "ความพร้อมเครื่องมือ", "ความสามารถแก้ปัญหา", "การสร้าง Value ให้ธุรกิจ", "ความพึงพอใจบรรยากาศทีม"];

    const qArea = document.getElementById('questionArea');
    questions.forEach((q, i) => {
        let n = i + 1;
        qArea.innerHTML += `<div class="form-group"><label>${n}. ${q}</label><div class="score-row">${[1,2,3,4,5].map(v => `<button type="button" class="score-btn" onclick="setS(${n},${v})" id="q${n}_${v}">${v}</button>`).join('')}</div><div class="legend"><span>น้อยสุด</span><span>มากสุด</span></div><input type="hidden" id="q${n}_s" required><textarea id="q${n}_t" placeholder="ข้อเสนอแนะเพิ่มเติม..."></textarea></div>`;
    });

    function setS(q, v) { 
        for(let i=1;i<=5;i++) document.getElementById(`q${q}_${i}`).classList.remove('active');
        document.getElementById(`q${q}_${v}`).classList.add('active');
        document.getElementById(`q${q}_s`).value = v;
    }

    document.getElementById('evalForm').addEventListener('submit', e => {
        e.preventDefault();
        for(let i=1;i<=8;i++) if(!document.getElementById(`q${i}_s`).value) return Swal.fire('ไม่ครบ','กรุณาให้คะแนนข้อ '+i,'warning');
        Swal.fire({title:'กำลังส่ง...',didOpen:()=>Swal.showLoading()});
        const body = { action:"saveEval", type:"self", bu:document.getElementById('evaluatorName').value, target:"ทีม COE Data" };
        for(let i=1;i<=8;i++){ body[`q${i}_score`]=document.getElementById(`q${i}_s`).value; body[`q${i}_note`]=document.getElementById(`q${i}_t`).value; }
        fetch(scriptURL,{method:'POST',mode:'no-cors',body:JSON.stringify(body)}).then(()=>Swal.fire('สำเร็จ!','ขอบคุณครับ','success').then(()=>location.reload()));
    });
</script>
</body>
</html>
